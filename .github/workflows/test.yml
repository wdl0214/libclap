name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4

jobs:
  test:
    name: ${{ matrix.os }} - ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Debug, Release]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: build
        key: ${{ matrix.os }}-${{ matrix.build_type }}-${{ hashFiles('**/CMakeLists.txt', 'src/**') }}
        restore-keys: |
          ${{ matrix.os }}-${{ matrix.build_type }}-
    
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
    
    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}
    
    - name: Test
      run: ctest --test-dir build --output-on-failure -C ${{ matrix.build_type }}
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.build_type }}
        path: build/Testing/
        retention-days: 7

  coverage:
      name: Coverage
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v4
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-gcovr-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-gcovr-
      
      - name: Install gcovr
        run: pip install gcovr

      - name: Configure CMake
        run: cmake -B build -DCLAP_ENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build

      - name: Generate coverage
        run: |
          cd build
          gcovr -r .. --xml -o coverage.xml
          gcovr -r .. --html-details -o coverage.html
          gcovr -r ..

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/coverage.xml
          fail_ci_if_error: false

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage.html
          retention-days: 30

  fuzz:
      name: Fuzz Test
      runs-on: ubuntu-latest
      # Only run fuzz on push to main/develop, not on PRs
      if: github.event_name == 'push'
      timeout-minutes: 5
      
      steps:
      - uses: actions/checkout@v4
      
      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: fuzz_corpus
          key: fuzz-corpus-${{ github.run_number }}
          restore-keys: |
            fuzz-corpus-

      - name: Configure CMake with Fuzz
        run: cmake -B build -DCLAP_BUILD_FUZZ=ON -DCMAKE_C_COMPILER=clang

      - name: Build Fuzz Target
        run: cmake --build build --target fuzz_clap

      - name: Create corpus directory
        run: |
          mkdir -p fuzz_corpus
          mkdir -p fuzz_artifacts

      - name: Run Fuzz Test
        run: |
          set +e
          set -o pipefail
          timeout 240 ./build/tests/fuzz_clap \
            -max_len=4096 \
            -runs=50000 \
            -timeout=5 \
            -artifact_prefix=fuzz_artifacts/ \
            fuzz_corpus/ 2>&1 | tee fuzz_output.log
          FUZZ_EXIT=$?
          set -e
          
          # Check for crashes
          if [ -d "fuzz_artifacts" ] && [ "$(ls -A fuzz_artifacts)" ]; then
            echo "::error::Fuzz testing found crashes!"
            exit 1
          fi
          
          if [ $FUZZ_EXIT -eq 124 ]; then
            echo "::warning::Fuzz test hit timeout (expected for long fuzzing)"
            exit 0
          fi
          
          exit $FUZZ_EXIT

      - name: Upload fuzz output log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-output-log
          path: fuzz_output.log
          retention-days: 7

      - name: Upload fuzz artifacts (crashes)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: fuzz_artifacts/
          retention-days: 30

      - name: Upload updated corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-update
          path: fuzz_corpus/
          retention-days: 7

  docs:
      name: Documentation
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Docs
        run: cmake --build build --target docs

      - name: Upload Docs Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/html

  deploy-docs:
      name: Deploy Docs to GitHub Pages
      needs: docs
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      permissions:
        pages: write
        id-token: write
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      runs-on: ubuntu-latest
      steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
